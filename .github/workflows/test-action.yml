name: Test the Action
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build check
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11.5.0
      - name: Use Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm run build
      - name: Check committed build output
        run: git diff --exit-code dist

  run_action:
    runs-on: ubuntu-latest
    name: Minimal inputs test
    needs: build
    steps:
      # To use this repository's action,
      # you must check out the repository
      - name: Checkout
        uses: actions/checkout@v6
      - name: Test Action
        id: run-action
        uses: ./ # Uses an action in the root directory
        with:
          workflow-id: test-action.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Test Action Output
        run: echo Commit SHA is ${{ steps.run-action.outputs.commit-sha }}

  run_action_event:
    runs-on: ubuntu-latest
    name: With all filters test
    needs: build
    steps:
      # To use this repository's action,
      # you must check out the repository
      - name: Checkout
        uses: actions/checkout@v6
      - name: Test Action
        id: run-action
        uses: ./ # Uses an action in the root directory
        with:
          branch: main
          workflow-id: test-action.yml
          event: push
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Test Action Output
        run: echo Commit SHA is ${{ steps.run-action.outputs.commit-sha }}
